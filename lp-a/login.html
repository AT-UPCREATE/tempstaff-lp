<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>認証 | FlexibleCAREER</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      background: #f5f5f5;
      font-family: sans-serif;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,.12);
      padding: 40px 36px;
      width: 320px;
    }
    h1 { font-size: 16px; margin-bottom: 24px; color: #333; text-align: center; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
    input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    input:focus { outline: 2px solid #e85c2b; border-color: transparent; }
    button {
      width: 100%;
      padding: 10px;
      background: #e85c2b;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #cc4d21; }
    .error { color: #c00; font-size: 13px; margin-top: 12px; text-align: center; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ステージング確認用ページ</h1>
    <form id="form">
      <label for="uid">ID</label>
      <input id="uid" type="text" autocomplete="username" required />
      <label for="pw">パスワード</label>
      <input id="pw" type="password" autocomplete="current-password" required />
      <button type="submit">ログイン</button>
      <p class="error" id="err">IDまたはパスワードが違います</p>
    </form>
  </div>
  <script>
    var ID = 'divsb';
    var PW = 'temp2026';
    document.getElementById('form').addEventListener('submit', function (e) {
      e.preventDefault();
      if (document.getElementById('uid').value === ID &&
          document.getElementById('pw').value === PW) {
        sessionStorage.setItem('stg_auth', '1');
        var params = new URLSearchParams(location.search);
        location.replace(params.get('from') || 'index.html');
      } else {
        document.getElementById('err').style.display = 'block';
      }
    });
  </script>
</body>
</html>
